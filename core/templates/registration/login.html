<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
            margin: 40px;
        }
        .box {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            color: #1f3c88;
        }
        button {
            padding: 10px 16px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Iniciar sesión</h1>

        {% if form.errors %}
            <p style="color:red;">Usuario o contraseña incorrectos.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
