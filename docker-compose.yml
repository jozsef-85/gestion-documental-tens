services:
  db:
    image: postgres:16-alpine
    container_name: gestion_documental_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME}
      POSTGRES_USER: ${DJANGO_DB_USER}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  gestion_documental:
    build: .
    container_name: gestion_documental_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-postgresql}
      DJANGO_DB_NAME: ${DJANGO_DB_NAME}
      DJANGO_DB_USER: ${DJANGO_DB_USER}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD}
      DJANGO_DB_HOST: ${DJANGO_DB_HOST}
      DJANGO_DB_PORT: ${DJANGO_DB_PORT:-5432}
      DJANGO_STATIC_ROOT: ${DJANGO_STATIC_ROOT:-/app/static}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/app/media}
      DJANGO_LOG_TO_FILE: ${DJANGO_LOG_TO_FILE:-True}
      DJANGO_LOG_TO_CONSOLE: ${DJANGO_LOG_TO_CONSOLE:-False}
      DJANGO_LOG_DIR: ${DJANGO_LOG_DIR:-/app/logs}
      DJANGO_APP_LOG_FILE: ${DJANGO_APP_LOG_FILE:-app.log}
      DJANGO_SECURITY_LOG_FILE: ${DJANGO_SECURITY_LOG_FILE:-security.log}
      DJANGO_LOG_MAX_BYTES: ${DJANGO_LOG_MAX_BYTES:-10485760}
      DJANGO_LOG_BACKUP_COUNT: ${DJANGO_LOG_BACKUP_COUNT:-5}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
      DJANGO_RUN_MIGRATIONS: ${DJANGO_RUN_MIGRATIONS:-0}
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
      - ./media:/app/media
      - ./logs:/app/logs

volumes:
  postgres_data:
